<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concretos Tecnológicos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#214ae4;--brand-dark:#0d1965;--brand-light:#e8edfd;--brand-mid:#b8c8f8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f8;color:#111827;font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--brand-dark);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px;color:#fff}
.logo-icon{width:30px;height:30px;background:var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.7)}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
.sync-indicator.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-indicator.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.layout{display:flex;flex:1}
.sidebar{width:210px;background:var(--brand-dark);padding:1rem 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);padding:0 1rem 0.4rem;text-transform:uppercase;letter-spacing:0.08em;margin-top:0.5rem}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.65);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{color:#fff;border-left-color:var(--brand);background:rgba(33,74,228,0.25);font-weight:500}
.nav-item i{font-size:16px}
.main{flex:1;padding:1.5rem;overflow:auto}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:1.5rem}
.page-title{font-size:20px;font-weight:600;color:#0d1965}
.page-sub{font-size:13px;color:#6b7280;margin-top:2px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.metric-card{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(13,25,101,0.06)}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:600;color:#0d1965}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:1.25rem;box-shadow:0 1px 3px rgba(13,25,101,0.06)}
.card-title{font-size:14px;font-weight:600;color:#0d1965;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#6b7280;text-align:left;padding:9px 12px;border-bottom:1px solid #e5e7eb;background:#f9fafb;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:var(--brand-light);color:var(--brand-dark)}
.badge-gray{background:#f3f4f6;color:#4b5563}
.badge-indigo{background:#e0e7ff;color:#3730a3}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:#f9fafb;border-color:#9ca3af}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:#1a3bbf}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{border-color:#fca5a5;color:#991b1b}
.btn-danger:hover{background:#fee2e2}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-group label{font-size:12px;color:#374151;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111827;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(33,74,228,0.12)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-input{width:200px}
.progress-bar{height:7px;border-radius:4px;background:#e5e7eb;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;background:var(--brand);transition:width .3s}
.progress-fill.warn{background:#f59e0b}
.progress-fill.danger{background:#ef4444}
.inventory-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3f4f6}
.inventory-item:last-child{border-bottom:none}
.modal-overlay{position:fixed;inset:0;background:rgba(13,25,101,0.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:1.5rem;width:min(580px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(13,25,101,0.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb}
.modal-title{font-size:16px;font-weight:600;color:#0d1965}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #e5e7eb}
.tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:1rem;overflow-x:auto}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.stat-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.stat-row-label{font-size:12px;color:#6b7280;flex:1}
.stat-row-value{font-size:13px;font-weight:600;color:#0d1965}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.alert-info{background:var(--brand-light);color:var(--brand-dark);border:1px solid var(--brand-mid)}
.divider{height:1px;background:#f3f4f6;margin:1rem 0}
.empty-state{text-align:center;padding:3rem 1rem;color:#9ca3af}
.empty-state i{font-size:36px;margin-bottom:0.75rem;display:block}
.section-header{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.6rem}
.loading-overlay{position:fixed;inset:0;background:rgba(13,25,101,0.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Barras de estadísticas */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:#374151;min-width:80px;flex-shrink:0}
.bar-track{flex:1;height:22px;background:#f0f2f8;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;background:var(--brand);display:flex;align-items:center;padding-left:8px;transition:width .4s;min-width:2px}
.bar-fill span{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.bar-val{font-size:12px;font-weight:600;color:#0d1965;min-width:90px;text-align:right}
/* MÓVIL */
@media(max-width:700px){
  .sidebar{display:none}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .section-grid{grid-template-columns:1fr}
  .main{padding:0.75rem;padding-bottom:72px}
  .cards-grid{grid-template-columns:1fr 1fr;gap:8px}
  .metric-card{padding:0.75rem}
  .metric-value{font-size:18px}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .modal{width:100vw;padding:1rem;max-height:96vh;border-radius:12px 12px 0 0;margin-top:auto}
  .modal-overlay{align-items:flex-end}
  .page-title{font-size:17px}
  .topbar{padding:0 1rem}
  .card{padding:1rem}
  .search-input{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-left{width:100%}
  .bar-label{min-width:60px;font-size:11px}
  .bar-val{min-width:70px;font-size:11px}
}
/* NAV INFERIOR MÓVIL */
.mob-bottom-nav{display:none}
@media(max-width:700px){
  .mob-bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--brand-dark);border-top:1px solid rgba(255,255,255,0.1);
    z-index:150;padding:4px 0 env(safe-area-inset-bottom,8px)
  }
  .mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;cursor:pointer;color:rgba(255,255,255,0.45);border:none;background:none;font-family:inherit}
  .mob-nav-btn.active{color:#fff}
  .mob-nav-btn i{font-size:21px}
  .mob-nav-btn span{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="logo-icon" style="width:48px;height:48px;font-size:16px;margin-bottom:4px">CT</div>
  <div style="font-size:16px;font-weight:600">Concretos Tecnológicos</div>
  <div class="loading-spinner"></div>
  <div style="font-size:13px;color:rgba(255,255,255,0.7)" id="loading-msg">Conectando con la base de datos...</div>
</div>

<div class="app">
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">CT</div>
    <div><div style="font-weight:700;font-size:14px;letter-spacing:-.2px">CONCRETOS</div><div style="font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,0.6)">TECNOLÓGICOS</div></div>
  </div>
  <div class="topbar-right">
    <span class="sync-indicator" id="sync-dot"></span>
    <span id="sync-label" style="font-size:11px">Sincronizado</span>
    <span style="margin-left:8px;font-size:12px" id="topbar-date"></span>
  </div>
</div>

<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div id="page-dashboard" class="page active"></div>
  <div id="page-estadisticas" class="page"></div>
  <div id="page-clientes" class="page"></div>
  <div id="page-despachos" class="page"></div>
  <div id="page-cxc" class="page"></div>
  <div id="page-cxp" class="page"></div>
  <div id="page-compras" class="page"></div>
  <div id="page-inventario" class="page"></div>
  <div id="page-produccion" class="page"></div>
  <div id="page-incidencias" class="page"></div>
  <div id="page-reporte" class="page"></div>
</div>
</div>
</div>

<!-- NAV MÓVIL INFERIOR -->
<nav class="mob-bottom-nav" id="mob-bottom-nav">
  <button class="mob-nav-btn" data-page="dashboard"><i class="ti ti-layout-dashboard"></i><span>Inicio</span></button>
  <button class="mob-nav-btn" data-page="despachos"><i class="ti ti-truck"></i><span>Despachos</span></button>
  <button class="mob-nav-btn" data-page="inventario"><i class="ti ti-stack"></i><span>Inventario</span></button>
  <button class="mob-nav-btn" data-page="cxc"><i class="ti ti-cash"></i><span>Cobrar</span></button>
  <button class="mob-nav-btn" data-page="estadisticas"><i class="ti ti-chart-bar"></i><span>Stats</span></button>
</nav>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9VjKISFd4CZh1k_dez-O1i6VRbulZN_Y",
  authDomain: "concretech-1f55d.firebaseapp.com",
  projectId: "concretech-1f55d",
  storageBucket: "concretech-1f55d.firebasestorage.app",
  messagingSenderId: "26951246579",
  appId: "1:26951246579:web:8799795ff5243ebad74d86"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, "planta", "datos");

const DEFAULT_DB = {
  clientes:[],despachos:[],cxc:[],cxp:[],
  inventario:{
    cemento:{stock:0,unidad:'ton',entrada:0,consumo:0},
    arena:{stock:320,unidad:'m³',entrada:0,consumo:0},
    grava:{stock:280,unidad:'m³',entrada:0,consumo:0},
    aditivo:{stock:450,unidad:'lt',entrada:0,consumo:0},
    combustible:{stock:1200,unidad:'lt',entrada:0,consumo:0},
    agua:{stock:80000,unidad:'lt',entrada:0,consumo:0}
  },
  compras:[],produccion:[],incidencias:[],
  vendedores:['Carlos Méndez','Ana Polanco','Luis Ferreira']
};

let DB = JSON.parse(JSON.stringify(DEFAULT_DB));
let saveTimeout = null;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot)return;
  dot.className='sync-indicator'+(s==='syncing'?' syncing':s==='error'?' error':'');
  lbl.textContent=s==='syncing'?'Guardando...':s==='error'?'Sin conexión':'Sincronizado';
}

async function saveDB(){
  setSyncStatus('syncing');
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{await setDoc(DOC_REF,DB);setSyncStatus('ok')}
    catch(e){console.error(e);setSyncStatus('error')}
  },600);
}

onSnapshot(DOC_REF,(snap)=>{
  if(snap.exists()){DB=snap.data();renderPage(currentPage)}
},(e)=>{console.error(e);setSyncStatus('error')});

async function initData(){
  try{
    const snap=await getDoc(DOC_REF);
    if(snap.exists()){DB=snap.data()}
    else{await setDoc(DOC_REF,DEFAULT_DB)}
    document.getElementById('loading-overlay').style.display='none';
    buildNav();renderPage('dashboard');
  }catch(e){
    document.getElementById('loading-msg').textContent='Error de conexión. Verifica tu internet.';
  }
}

// ── NAVEGACIÓN ──
const PAGES=[
  {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard',section:'Gerencial'},
  {id:'estadisticas',label:'Estadísticas',icon:'ti-chart-bar',section:'Gerencial'},
  {id:'reporte',label:'Reporte diario',icon:'ti-report',section:'Gerencial'},
  {id:'clientes',label:'Clientes y obras',icon:'ti-building',section:'Comercial'},
  {id:'despachos',label:'Despachos',icon:'ti-truck',section:'Comercial'},
  {id:'cxc',label:'Cuentas por cobrar',icon:'ti-cash',section:'Finanzas'},
  {id:'cxp',label:'Cuentas por pagar',icon:'ti-receipt',section:'Finanzas'},
  {id:'compras',label:'Compras',icon:'ti-shopping-cart',section:'Finanzas'},
  {id:'inventario',label:'Inventario',icon:'ti-stack',section:'Operaciones'},
  {id:'produccion',label:'Producción',icon:'ti-settings',section:'Operaciones'},
  {id:'incidencias',label:'Incidencias',icon:'ti-alert-triangle',section:'Operaciones'},
];

let currentPage='dashboard';
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'});

function buildNav(){
  const sidebar=document.getElementById('sidebar');
  let sections={};
  PAGES.forEach(p=>{if(!sections[p.section])sections[p.section]=[];sections[p.section].push(p)});
  let html='';
  Object.keys(sections).forEach(s=>{
    html+=`<div style="padding:.5rem 0 0"><div class="nav-label">${s}</div>`;
    sections[s].forEach(p=>{html+=`<div class="nav-item${p.id===currentPage?' active':''}" data-page="${p.id}"><i class="ti ${p.icon}"></i>${p.label}</div>`});
    html+='</div>';
  });
  sidebar.innerHTML=html;
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',()=>navigateTo(el.dataset.page));
  });
  document.querySelectorAll('.mob-nav-btn').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===currentPage);
  });
}

function navigateTo(pageId){
  currentPage=pageId;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  buildNav();renderPage(pageId);
}

function renderPage(p){
  const fns={dashboard:renderDashboard,estadisticas:renderEstadisticas,clientes:renderClientes,despachos:renderDespachos,cxc:renderCXC,cxp:renderCXP,inventario:renderInventario,compras:renderCompras,produccion:renderProduccion,incidencias:renderIncidencias,reporte:renderReporte};
  if(fns[p])fns[p]();
}

// ── HELPERS ──
function fmt(n){return Number(n).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(n){return Number(n).toLocaleString('es-DO')}
function today(){return new Date().toISOString().split('T')[0]}
function todayDisplay(){return new Date().toLocaleDateString('es-DO',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function kpi(label,value,color){return`<div class="metric-card"><div class="metric-label">${label}</div><div class="metric-value" style="${color?'color:'+color:''}">${value}</div></div>`}
function mesLabel(ym){const[y,m]=ym.split('-');const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return meses[parseInt(m)-1]+' '+y}
const badgeEstado={programado:'badge-indigo',despachado:'badge-amber',facturado:'badge-gray',cobrado:'badge-green',pendiente:'badge-red'};
const RESISTENCIAS=['180 kg/cm²','210 kg/cm²','240 kg/cm²','250 kg/cm²','280 kg/cm²','350 kg/cm²'];
const ESTADOS_DSP=['programado','despachado','facturado','cobrado','pendiente'];
const TIPOS_INC=['Mecánica','Eléctrica','Operativa','Seguridad','Calidad','Combustible','Inventario'];
const ESTADOS_INC=['abierta','en proceso','cerrada'];
const CAPS={cemento:200,arena:500,grava:500,aditivo:1000,combustible:3000,agua:100000};
const LABS={cemento:'Cemento',arena:'Arena',grava:'Grava',aditivo:'Aditivo',combustible:'Combustible',agua:'Agua'};

// ── DASHBOARD ──
function renderDashboard(){
  const el=document.getElementById('page-dashboard');
  const tod=today();
  const desphoy=(DB.despachos||[]).filter(d=>d.fecha===tod);
  const despsem=(DB.despachos||[]).filter(d=>{const dd=new Date(d.fecha),now=new Date(),wk=new Date(now);wk.setDate(now.getDate()-7);return dd>=wk});
  const dspmes=(DB.despachos||[]).filter(d=>d.fecha&&d.fecha.slice(0,7)===tod.slice(0,7));
  const ventaHoy=desphoy.reduce((s,d)=>s+Number(d.total),0);
  const ventaSem=despsem.reduce((s,d)=>s+Number(d.total),0);
  const ventaMes=dspmes.reduce((s,d)=>s+Number(d.total),0);
  const cobrado=(DB.cxc||[]).filter(c=>c.estado==='cobrada').reduce((s,c)=>s+Number(c.monto),0);
  const pendiente=(DB.cxc||[]).filter(c=>c.estado==='pendiente'||c.estado==='parcial').reduce((s,c)=>s+Number(c.montoPendiente||c.monto),0);
  const m3Hoy=desphoy.reduce((s,d)=>s+Number(d.volumen),0);
  const m3Mes=dspmes.reduce((s,d)=>s+Number(d.volumen),0);
  const obras=new Set((DB.despachos||[]).filter(d=>d.estado==='despachado'||d.estado==='programado').map(d=>d.obra)).size;
  const cxpPend=(DB.cxp||[]).filter(c=>c.estado==='pendiente').reduce((s,c)=>s+Number(c.monto),0);
  const inv=DB.inventario||{};
  el.innerHTML=`
<div class="page-header"><div class="page-title">Dashboard gerencial</div><div class="page-sub">${todayDisplay()}</div></div>
${pendiente>50000?`<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i><strong>RD$${fmt(pendiente)}</strong> pendiente por cobrar.</div>`:''}
<div class="section-header">Ventas</div>

// ── ESTADÍSTICAS ──
function renderEstadisticas(){
  const el=document.getElementById('page-estadisticas');
  const despachos=DB.despachos||[];

  // Agrupar por mes
  const byMes={};
  despachos.forEach(d=>{
    if(!d.fecha)return;
    const mes=d.fecha.slice(0,7);
    if(!byMes[mes])byMes[mes]={mes,m3:0,ventas:0,despachos:0,cobrado:0};
    byMes[mes].m3+=Number(d.volumen)||0;
    byMes[mes].ventas+=Number(d.total)||0;
    byMes[mes].despachos+=1;
  });
  // Cobros por mes
  (DB.cxc||[]).forEach(c=>{
    (c.pagos||[]).forEach(p=>{
      if(!p.fecha)return;
      const mes=p.fecha.slice(0,7);
      if(byMes[mes])byMes[mes].cobrado+=Number(p.monto)||0;
    });
  });

  const meses=Object.values(byMes).sort((a,b)=>a.mes.localeCompare(b.mes));
  const maxVentas=Math.max(...meses.map(m=>m.ventas),1);
  const maxM3=Math.max(...meses.map(m=>m.m3),1);

  // Por resistencia
  const byResist={};
  despachos.forEach(d=>{
    const r=d.resistencia||'Sin especificar';
    if(!byResist[r])byResist[r]={m3:0,count:0};
    byResist[r].m3+=Number(d.volumen)||0;
    byResist[r].count+=1;
  });
  const resistArr=Object.entries(byResist).sort((a,b)=>b[1].m3-a[1].m3);
  const maxResistM3=Math.max(...resistArr.map(r=>r[1].m3),1);

  // Por cliente
  const byCliente={};
  despachos.forEach(d=>{
    const c=d.cliente||'Sin cliente';
    if(!byCliente[c])byCliente[c]={ventas:0,m3:0};
    byCliente[c].ventas+=Number(d.total)||0;
    byCliente[c].m3+=Number(d.volumen)||0;
  });
  const clienteArr=Object.entries(byCliente).sort((a,b)=>b[1].ventas-a[1].ventas).slice(0,8);
  const maxClienteVentas=Math.max(...clienteArr.map(c=>c[1].ventas),1);

  // Mes seleccionado (default: último mes con datos)
  const mesActual=meses.length?meses[meses.length-1].mes:today().slice(0,7);

  el.innerHTML=`
<div class="page-header"><div class="page-title">Estadísticas</div><div class="page-sub">Análisis histórico de operaciones</div></div>

${!meses.length?`<div class="empty-state"><i class="ti ti-chart-bar-off"></i><p>Registra despachos para ver estadísticas.</p></div>`:`

<div class="tabs" id="stats-tabs">
  <div class="tab active" onclick="switchStatTab(this,'tab-mensual')"><i class="ti ti-calendar-month"></i> Por mes</div>
  <div class="tab" onclick="switchStatTab(this,'tab-resist')"><i class="ti ti-layers-intersect"></i> Por resistencia</div>
  <div class="tab" onclick="switchStatTab(this,'tab-clientes')"><i class="ti ti-building"></i> Por cliente</div>
</div>

<div id="tab-mensual">
  <div class="section-header" style="margin-bottom:1rem">Ventas mensuales (RD$)</div>
  <div class="card" style="margin-bottom:1rem">
    ${meses.map(m=>{
      const pct=Math.round((m.ventas/maxVentas)*100);
      return`<div class="bar-row">
        <div class="bar-label">${mesLabel(m.mes)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"><span>${pct>15?'RD$ '+fmt(m.ventas):''}</span></div></div>
        <div class="bar-val">RD$ ${fmt(m.ventas)}</div>
      </div>`;
    }).join('')}
  </div>

  <div class="section-header" style="margin-bottom:1rem">m³ despachados por mes</div>
  <div class="card" style="margin-bottom:1rem">
    ${meses.map(m=>{
      const pct=Math.round((m.m3/maxM3)*100);
      return`<div class="bar-row">
        <div class="bar-label">${mesLabel(m.mes)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#0d1965"><span>${pct>15?m.m3.toFixed(1)+' m³':''}</span></div></div>
        <div class="bar-val">${m.m3.toFixed(1)} m³</div>
      </div>`;
    }).join('')}
  </div>

  <div class="section-grid">

      <div class="card-title">Resumen por mes</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Mes</th><th>Despachos</th><th>m³</th><th>Ventas</th><th>Cobrado</th></tr></thead>
        <tbody>${meses.map(m=>`<tr>
          <td style="font-weight:600;color:#0d1965">${mesLabel(m.mes)}</td>
          <td>${m.despachos}</td>

          <td style="color:#166534;font-weight:600">RD$ ${fmt(m.cobrado)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  </div>
</div>

<div id="tab-resist" style="display:none">
  <div class="section-header" style="margin-bottom:1rem">m³ despachados por resistencia</div>
  <div class="card" style="margin-bottom:1rem">
    ${resistArr.map(([r,v])=>{
      const pct=Math.round((v.m3/maxResistM3)*100);
      return`<div class="bar-row">
        <div class="bar-label" style="min-width:90px;font-size:11px">${r}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#214ae4"><span>${pct>15?v.m3.toFixed(1)+' m³':''}</span></div></div>
        <div class="bar-val">${v.m3.toFixed(1)} m³<br><span style="font-size:10px;color:#6b7280">${v.count} viajes</span></div>
      </div>`;
    }).join('')}
  </div>
  <div class="cards-grid">
    ${resistArr.map(([r,v])=>kpi(r,v.m3.toFixed(1)+' m³')).join('')}
  </div>
</div>

<div id="tab-clientes" style="display:none">
  <div class="section-header" style="margin-bottom:1rem">Top clientes por ventas</div>
  <div class="card" style="margin-bottom:1rem">
    ${clienteArr.map(([c,v])=>{
      const pct=Math.round((v.ventas/maxClienteVentas)*100);
      return`<div class="bar-row">
        <div class="bar-label">${c.split(' ')[0]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#0d1965"><span>${pct>20?'RD$ '+fmt(v.ventas):''}</span></div></div>
        <div class="bar-val">RD$ ${fmt(v.ventas)}</div>
      </div>`;
    }).join('')}
  </div>
  <div style="overflow-x:auto"><table>
    <thead><tr><th>Cliente</th><th>m³ total</th><th>Total ventas</th></tr></thead>
    <tbody>${clienteArr.map(([c,v])=>`<tr><td style="font-weight:600;color:#0d1965">${c}</td><td>${v.m3.toFixed(1)} m³</td><td style="font-weight:700">RD$ ${fmt(v.ventas)}</td></tr>`).join('')}</tbody>
  </table></div>
</div>
`}`;
}

window.switchStatTab=function(el,tid){

  <div class="card" style="overflow-x:auto"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Obra</th><th>m³</th><th>Resist.</th><th>Total</th><th>Estado</th><th></th></tr></thead>

window.calcDespacho=function(){
  const vol=parseFloat(document.getElementById('d-vol').value)||0;
  const precio=parseFloat(document.getElementById('d-precio').value)||0;
  const itbis=document.getElementById('d-itbis').value;

  document.getElementById('d-subtotal').textContent='RD$ '+fmt(sub);
  document.getElementById('d-total').textContent='RD$ '+fmt(total);
}

window.updateObrasSelect=function(){
  const cn=document.getElementById('d-cliente').value;
  const cl=(DB.clientes||[]).find(c=>c.nombre===cn);
  const obras=(cl&&cl.obras)||[];
  document.getElementById('d-obra').innerHTML=obras.map(o=>`<option>${o.nombre}</option>`).join('')||'<option value="">Sin obras</option>';
}
window.saveDespacho=async function(idx){
  const fecha=document.getElementById('d-fecha').value;
  const cliente=document.getElementById('d-cliente').value;
  const volumen=parseFloat(document.getElementById('d-vol').value);

  <div class="form-group"><label>Chofer</label><input id="pr-chofer"></div>
  <div class="form-row"><div class="form-group"><label>Hora salida</label><input id="pr-sal" type="time"></div><div class="form-group"><label>Hora llegada</label><input id="pr-llg" type="time"></div></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="window.saveProduccion()">Registrar</button></div>`);
}
window.saveProduccion=async function(){
  const vol=parseFloat(document.getElementById('pr-vol').value);
  if(!vol)return alert('Ingresa el volumen');
  if(!DB.produccion)DB.produccion=[];
  DB.produccion.push({fecha:document.getElementById('pr-fecha').value,cliente:document.getElementById('pr-cliente').value,obra:document.getElementById('pr-obra').value,volumen:vol,resistencia:document.getElementById('pr-resist').value,camion:document.getElementById('pr-camion').value,chofer:document.getElementById('pr-chofer').value,horaSalida:document.getElementById('pr-sal').value,horaLlegada:document.getElementById('pr-llg').value});
  await saveDB();closeModal();renderProduccion();
}

// ── INCIDENCIAS ──
function renderIncidencias(){
  const el=document.getElementById('page-incidencias');
  const abiertas=(DB.incidencias||[]).filter(i=>i.estado==='abierta').length;
  const proceso=(DB.incidencias||[]).filter(i=>i.estado==='en proceso').length;
  const cerradas=(DB.incidencias||[]).filter(i=>i.estado==='cerrada').length;
  el.innerHTML=`<div class="page-header"><div class="page-title">Incidencias de planta</div></div>
<div class="cards-grid">${kpi('Abiertas',abiertas,'#991b1b')}${kpi('En proceso',proceso,'#92400e')}${kpi('Cerradas',cerradas,'#166534')}</div>
<div class="toolbar"><div></div><button class="btn btn-primary" onclick="window.modalIncidencia()"><i class="ti ti-plus"></i>Nueva incidencia</button></div>
<div class="section-grid">${(DB.incidencias||[]).length?(DB.incidencias||[]).map((inc,i)=>`<div class="card" style="border-left:4px solid ${inc.estado==='abierta'?'#ef4444':inc.estado==='en proceso'?'#f59e0b':'#22c55e'}">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="badge badge-${inc.tipo==='Mecánica'?'amber':inc.tipo==='Eléctrica'?'blue':inc.tipo==='Seguridad'?'red':'gray'}">${inc.tipo}</span><span class="badge ${inc.estado==='abierta'?'badge-red':inc.estado==='en proceso'?'badge-amber':'badge-green'}">${inc.estado}</span></div>
  <div style="font-size:12px;color:#6b7280;margin-bottom:6px">${inc.fecha}${inc.hora?' · '+inc.hora:''}</div>
  <div style="font-size:14px;font-weight:500;margin-bottom:8px">${inc.descripcion}</div>
  ${inc.responsable?`<div style="font-size:12px;color:#6b7280">Resp: ${inc.responsable}</div>`:''}
  <div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-sm" onclick="window.modalIncidencia(${i})" style="flex:1;justify-content:center"><i class="ti ti-edit"></i> Editar</button><button class="btn btn-sm btn-danger" onclick="window.deleteIncidencia(${i})"><i class="ti ti-trash"></i></button></div>
</div>`).join(''):`<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-mood-happy"></i><p>Sin incidencias.</p></div>`}</div>`;
}
window.deleteIncidencia=async function(i){if(!confirm('¿Eliminar?'))return;(DB.incidencias||[]).splice(i,1);await saveDB();renderIncidencias()}
window.modalIncidencia=function(idx){
  const inc=idx!==undefined?(DB.incidencias||[])[idx]:{tipo:'Mecánica',fecha:today(),hora:'',descripcion:'',responsable:'',accion:'',estado:'abierta'};
  showModal(`<div class="modal-header"><div class="modal-title">${idx!==undefined?'Editar':'Nueva'} incidencia</div><button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="form-row"><div class="form-group"><label>Tipo</label><select id="inc-tipo">${TIPOS_INC.map(t=>`<option${inc.tipo===t?' selected':''}>${t}</option>`).join('')}</select></div><div class="form-group"><label>Estado</label><select id="inc-estado">${ESTADOS_INC.map(e=>`<option value="${e}"${inc.estado===e?' selected':''}>${e.charAt(0).toUpperCase()+e.slice(1)}</option>`).join('')}</select></div></div>
  <div class="form-row"><div class="form-group"><label>Fecha</label><input id="inc-fecha" type="date" value="${inc.fecha}"></div><div class="form-group"><label>Hora</label><input id="inc-hora" type="time" value="${inc.hora||''}"></div></div>
  <div class="form-group"><label>Descripción *</label><textarea id="inc-desc" rows="3">${inc.descripcion}</textarea></div>
  <div class="form-group"><label>Responsable</label><input id="inc-resp" value="${inc.responsable||''}"></div>
  <div class="form-group"><label>Acción correctiva</label><textarea id="inc-accion" rows="2">${inc.accion||''}</textarea></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="window.saveIncidencia(${idx})">${idx!==undefined?'Guardar':'Registrar'}</button></div>`);
}
window.saveIncidencia=async function(idx){
  const desc=document.getElementById('inc-desc').value.trim();
  if(!desc)return alert('La descripción es obligatoria');
  const obj={tipo:document.getElementById('inc-tipo').value,fecha:document.getElementById('inc-fecha').value,hora:document.getElementById('inc-hora').value,descripcion:desc,responsable:document.getElementById('inc-resp').value,accion:document.getElementById('inc-accion').value,estado:document.getElementById('inc-estado').value};
  if(!DB.incidencias)DB.incidencias=[];
  if(idx!==undefined)DB.incidencias[idx]=obj;else DB.incidencias.push(obj);
  await saveDB();closeModal();renderIncidencias();
}

// ── REPORTE ──
function renderReporte(){
  const el=document.getElementById('page-reporte');
  const tod=today();
  const desphoy=(DB.despachos||[]).filter(d=>d.fecha===tod);
  const m3Hoy=desphoy.reduce((s,d)=>s+Number(d.volumen),0);
  const ventaHoy=desphoy.reduce((s,d)=>s+Number(d.total),0);
  const cobrosHoy=(DB.cxc||[]).reduce((s,c)=>s+((c.pagos||[]).filter(p=>p.fecha===tod).reduce((a,p)=>a+Number(p.monto),0)),0);
  const pagosHoy=(DB.cxp||[]).filter(c=>c.fecha===tod&&c.estado==='pagada').reduce((s,c)=>s+Number(c.monto),0);
  const incAbiertas=(DB.incidencias||[]).filter(i=>i.estado==='abierta').length;
  el.innerHTML=`<div class="page-header"><div class="page-title">Reporte diario</div><div class="page-sub">${todayDisplay()}</div></div>
<div class="section-grid">
  <div class="card"><div class="card-title"><i class="ti ti-settings" style="color:var(--brand)"></i> Producción</div><div class="stat-row"><span class="stat-row-label">m³ despachados</span><span class="stat-row-value">${m3Hoy.toFixed(1)} m³</span></div><div class="stat-row"><span class="stat-row-label">Despachos</span><span class="stat-row-value">${desphoy.length}</span></div></div>
  <div class="card"><div class="card-title"><i class="ti ti-cash" style="color:var(--brand)"></i> Ventas y cobros</div><div class="stat-row"><span class="stat-row-label">Total vendido</span><span class="stat-row-value">RD$ ${fmt(ventaHoy)}</span></div><div class="stat-row"><span class="stat-row-label">Cobros recibidos</span><span class="stat-row-value" style="color:#166534">RD$ ${fmt(cobrosHoy)}</span></div><div class="stat-row"><span class="stat-row-label">Pagos realizados</span><span class="stat-row-value" style="color:#991b1b">RD$ ${fmt(pagosHoy)}</span></div></div>
  <div class="card"><div class="card-title"><i class="ti ti-stack" style="color:var(--brand)"></i> Inventario</div>${Object.entries(DB.inventario||{}).map(([k,v])=>`<div class="stat-row"><span class="stat-row-label">${LABS[k]}</span><span class="stat-row-value">${fmtN(v.stock)} ${v.unidad}</span></div>`).join('')}</div>
  <div class="card"><div class="card-title"><i class="ti ti-alert-triangle" style="color:#f59e0b"></i> Incidencias</div><div class="stat-row"><span class="stat-row-label">Abiertas</span><span class="stat-row-value" style="color:#991b1b">${incAbiertas}</span></div></div>
</div>`;
}

// ── UI HELPERS ──
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
window.closeModal=function(){document.getElementById('modal-container').innerHTML=''}
window.switchTab=function(el,tid){el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');['tab-c','tab-o'].forEach(id=>{const d=document.getElementById(id);if(d)d.style.display=id===tid?'block':'none'})}

initData();
</script>
</body>
</html>
